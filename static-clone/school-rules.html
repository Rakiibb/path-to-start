<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>School Rules — SmartClass</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="navbar" id="navbar"></header>
    <div class="content">
      <div class="page-header">
        <h1>School Rules</h1>
        <p>Guidelines every student and captain must follow.</p>
      </div>
      <div class="grid cols-2" id="rules-list"></div>
    </div>
  </div>
</div>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
renderLayout("School Rules");
document.getElementById("rules-list").innerHTML = DB.rules.map(r => `
  <div class="card">
    <div class="row between mb-2">
      <h3>${r.title}</h3>
      <span class="badge gray">${r.category}</span>
    </div>
    <p class="text-sm text-muted">${r.body}</p>
  </div>
`).join("");
</script>
</body>
</html>
