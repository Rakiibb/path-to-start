</head>
<body>
<div class="app">
  <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon">🎓</div>
        <div class="brand-name">SmartClass</div>
      </div>
      <a href="index.html" class="nav-item"><span class="icon">📊</span><span>Dashboard</span></a>
      <a href="captain-feedback.html" class="nav-item"><span class="icon">🛡️</span><span>Captain Feedback</span></a>
      <a href="seat-planner.html" class="nav-item"><span class="icon">🪑</span><span>Seat Planner</span></a>
      <a href="sos.html" class="nav-item active"><span class="icon">🚨</span><span>SOS</span></a>
      <a href="school-rules.html" class="nav-item"><span class="icon">📖</span><span>School Rules</span></a>
      <a href="notifications.html" class="nav-item"><span class="icon">🔔</span><span>Notifications</span></a>
      <a href="ai-syllabus.html" class="nav-item"><span class="icon">✨</span><span>AI Syllabus</span></a>
      <a href="profile.html" class="nav-item"><span class="icon">👤</span><span>Profile</span></a>
      <a href="student-management.html" class="nav-item"><span class="icon">👥</span><span>Student Management</span></a>
    </aside>
  <div class="main">
    <header class="navbar">
      <div>
        <div class="subtitle">SmartClass</div>
        <div class="title">SOS</div>
      </div>
      <div class="right">
        <button class="sos-btn" onclick="location.href='sos.html'"><span>⚠️</span> SOS</button>
        <a href="notifications.html" class="btn outline small" title="Notifications">🔔</a>
        <div class="row" style="border:1px solid var(--border);border-radius:10px;padding:4px 10px 4px 4px;gap:8px;">
          <div class="avatar">AR</div>
          <div>
            <div style="font-size:13px;font-weight:500;">Ashfaq Rahman</div>
            <div class="text-xs text-muted" style="text-transform:capitalize;">captain</div>
          </div>
        </div>
      </div>
    </header>
    <div class="content">
      <div class="page-header">
        <h1>🚨 SOS Emergency</h1>
        <p>Trigger an emergency alert to notify all captains immediately.</p>
      </div>

      <div class="card mb-4" style="border-color:#fca5a5;background:#fef2f2;">
        <div class="field">
          <label>Emergency Message</label>
          <textarea class="textarea" id="sos-msg" placeholder="Describe the emergency..."></textarea>
        </div>
        <button class="btn danger" onclick="triggerSOS()">🚨 Trigger SOS Alert</button>
      </div>

      <div class="card">
        <h3 class="mb-4">SOS History</h3>
        <div id="sos-list"></div>
      </div>
    </div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
function render() {
  document.getElementById("sos-list").innerHTML = DB.sos.length ? DB.sos
    .slice().sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt))
    .map(s => `
      <div class="fb-item">
        <div class="row between">
          <h4>${s.message}</h4>
          <span class="badge ${s.status === 'Resolved' ? 'verified' : 'red'}">${s.status}</span>
        </div>
        <div class="meta">🕒 ${fmtDateTime(s.createdAt)}</div>
        ${s.status !== 'Resolved' ? `<button class="btn small outline mt-4" onclick="resolve('${s.id}')">Mark Resolved</button>` : ''}
      </div>
    `).join("") : '<p class="text-muted text-sm">No SOS requests.</p>';
}
function triggerSOS() {
  const msg = document.getElementById("sos-msg").value.trim();
  if (!msg) { toast("Please describe the emergency."); return; }
  DB.sos.unshift({ id: uid("sos"), message: msg, status: "Active", createdAt: new Date().toISOString() });
  DB.notifications.unshift({
    id: uid("n"), title: "🚨 Emergency Alert", message: "A student needs immediate assistance.",
    category: "SOS", read: false, createdAt: new Date().toISOString(),
  });
  saveData(DB);
  document.getElementById("sos-msg").value = "";
  render();
  toast("SOS alert triggered.");
}
function resolve(id) {
  const s = DB.sos.find(x => x.id === id);
  if (s) { s.status = "Resolved"; saveData(DB); render(); toast("SOS resolved."); }
}
render();
</script>
</body>
</html>
