    <div class="content">
      <div class="page-header">
        <div class="row between">
          <div><h1>Notifications</h1><p>Recent updates from your classroom.</p></div>
          <button class="btn outline small" onclick="markAll()">Mark all read</button>
        </div>
      </div>
      <div class="card"><div id="list"></div></div>
    </div>
  </div>
</div>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
function render() {
  document.getElementById("list").innerHTML = DB.notifications.length ? DB.notifications.map(n => `
    <div class="notif ${n.read ? '' : 'unread'}" onclick="mark('${n.id}')">
      <div class="icon-wrap">🔔</div>
      <div class="body" style="flex:1;">
        <div class="row between"><h4>${n.title}</h4><span class="badge gray">${n.category}</span></div>
        <p>${n.message}</p>
        <div class="time">${timeAgo(n.createdAt)}</div>
      </div>
    </div>
  `).join("") : '<p class="text-muted text-sm">No notifications.</p>';
}
function mark(id) {
  const n = DB.notifications.find(x => x.id === id);
  if (n) { n.read = true; saveData(DB); render(); }
}
function markAll() {
  DB.notifications.forEach(n => n.read = true); saveData(DB); render(); toast("All marked read.");
}
render();
</script>
</body>
