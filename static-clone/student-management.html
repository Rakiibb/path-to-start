<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Student Management — SmartClass</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="app">
  <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon">🎓</div>
        <div class="brand-name">SmartClass</div>
      </div>
      <a href="index.html" class="nav-item"><span class="icon">📊</span><span>Dashboard</span></a>
      <a href="captain-feedback.html" class="nav-item"><span class="icon">🛡️</span><span>Captain Feedback</span></a>
      <a href="seat-planner.html" class="nav-item"><span class="icon">🪑</span><span>Seat Planner</span></a>
      <a href="sos.html" class="nav-item"><span class="icon">🚨</span><span>SOS</span></a>
      <a href="school-rules.html" class="nav-item"><span class="icon">📖</span><span>School Rules</span></a>
      <a href="notifications.html" class="nav-item"><span class="icon">🔔</span><span>Notifications</span></a>
      <a href="ai-syllabus.html" class="nav-item"><span class="icon">✨</span><span>AI Syllabus</span></a>
      <a href="profile.html" class="nav-item"><span class="icon">👤</span><span>Profile</span></a>
      <a href="student-management.html" class="nav-item active"><span class="icon">👥</span><span>Student Management</span></a>
    </aside>
  <div class="main">
    <header class="navbar">
      <div>
        <div class="subtitle">SmartClass</div>
        <div class="title">Student Management</div>
      </div>
      <div class="right">
        <button class="sos-btn" onclick="location.href='sos.html'"><span>⚠️</span> SOS</button>
        <a href="notifications.html" class="btn outline small" title="Notifications">🔔</a>
        <div class="row" style="border:1px solid var(--border);border-radius:10px;padding:4px 10px 4px 4px;gap:8px;">
          <div class="avatar">AR</div>
          <div>
            <div style="font-size:13px;font-weight:500;">Ashfaq Rahman</div>
            <div class="text-xs text-muted" style="text-transform:capitalize;">captain</div>
          </div>
        </div>
      </div>
    </header>
    <div class="content">
      <div class="page-header">
        <div class="row between">
          <div><h1>Student Management</h1><p>Add, edit, or remove students in your class.</p></div>
          <button class="btn" onclick="openAdd()">+ Add Student</button>
        </div>
      </div>
      <div class="card">
        <table class="table">
          <thead><tr><th>Roll</th><th>Name</th><th>Height (cm)</th><th></th></tr></thead>
          <tbody id="tbl"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="dialog-backdrop" id="dlg">
  <div class="dialog" style="max-width:420px;">
    <div class="dialog-header"><h2 id="dlg-title">Add Student</h2><button class="close-btn" onclick="closeDialog()">×</button></div>
    <form id="sform">
      <input type="hidden" name="id" />
      <div class="field"><label>Full Name</label><input class="input" name="name" required /></div>
      <div class="field"><label>Roll Number</label><input class="input" name="roll" required /></div>
      <div class="field"><label>Height (cm)</label><input class="input" type="number" name="height" min="100" max="220" /></div>
      <div class="row" style="justify-content:flex-end;gap:8px;">
        <button type="button" class="btn outline" onclick="closeDialog()">Cancel</button>
        <button class="btn">Save</button>
      </div>
    </form>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
function render() {
  document.getElementById("tbl").innerHTML = DB.students.map(s => `
    <tr>
      <td><strong>${s.roll}</strong></td>
      <td>${s.name}</td>
      <td>${s.height || '—'}</td>
      <td style="text-align:right;">
        <button class="btn small outline" onclick='openEdit(${JSON.stringify(s)})'>Edit</button>
        <button class="btn small danger" onclick="del('${s.id}')">Delete</button>
      </td>
    </tr>
  `).join("");
}
function openAdd() {
  document.getElementById("dlg-title").textContent = "Add Student";
  const f = document.getElementById("sform");
  f.reset(); f.id.value = "";
  document.getElementById("dlg").classList.add("open");
}
function openEdit(s) {
  document.getElementById("dlg-title").textContent = "Edit Student";
  const f = document.getElementById("sform");
  f.id.value = s.id; f.name.value = s.name; f.roll.value = s.roll; f.height.value = s.height || "";
  document.getElementById("dlg").classList.add("open");
}
function closeDialog() { document.getElementById("dlg").classList.remove("open"); }
function del(id) {
  if (!confirm("Delete this student?")) return;
  DB.students = DB.students.filter(s => s.id !== id);
  Object.keys(DB.seatMap).forEach(k => { if (DB.seatMap[k] === id) delete DB.seatMap[k]; });
  saveData(DB); render(); toast("Student deleted.");
}
document.getElementById("sform").addEventListener("submit", e => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const id = fd.get("id");
  const data = { name: fd.get("name"), roll: fd.get("roll"), height: Number(fd.get("height")) || null };
  if (id) {
    const s = DB.students.find(x => x.id === id); Object.assign(s, data);
  } else {
    DB.students.push({ id: uid("s"), ...data });
  }
  saveData(DB); closeDialog(); render(); toast("Saved.");
});
render();
</script>
</body>
</html>
