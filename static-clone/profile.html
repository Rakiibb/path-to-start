</head>
<body>
<div class="app">
  <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon">🎓</div>
        <div class="brand-name">SmartClass</div>
      </div>
      <a href="index.html" class="nav-item"><span class="icon">📊</span><span>Dashboard</span></a>
      <a href="captain-feedback.html" class="nav-item"><span class="icon">🛡️</span><span>Captain Feedback</span></a>
      <a href="captain-feedback.html#corruption-money" class="nav-item"><span class="icon">💰</span><span>Corruption Money</span></a>
      <a href="seat-planner.html" class="nav-item"><span class="icon">🪑</span><span>Seat Planner</span></a>
      <a href="sos.html" class="nav-item"><span class="icon">🚨</span><span>SOS</span></a>
      <a href="school-rules.html" class="nav-item"><span class="icon">📖</span><span>School Rules</span></a>
      <a href="notifications.html" class="nav-item"><span class="icon">🔔</span><span>Notifications</span></a>
      <a href="ai-syllabus.html" class="nav-item"><span class="icon">✨</span><span>AI Syllabus</span></a>
      <a href="profile.html" class="nav-item active"><span class="icon">👤</span><span>Profile</span></a>
      <a href="student-management.html" class="nav-item"><span class="icon">👥</span><span>Student Management</span></a>
    </aside>
  <div class="main">
    <header class="navbar">
      <div>
        <div class="subtitle">SmartClass</div>
        <div class="title">Profile</div>
      </div>
      <div class="right">
        <button class="sos-btn" onclick="location.href='sos.html'"><span>⚠️</span> SOS</button>
        <a href="notifications.html" class="btn outline small" title="Notifications">🔔</a>
        <div class="row" style="border:1px solid var(--border);border-radius:10px;padding:4px 10px 4px 4px;gap:8px;">
          <div class="avatar">AR</div>
          <div>
            <div style="font-size:13px;font-weight:500;">Ashfaq Rahman</div>
            <div class="text-xs text-muted" style="text-transform:capitalize;">captain</div>
          </div>
        </div>
      </div>
    </header>
    <div class="content">
      <div class="page-header"><h1>My Profile</h1><p>Update your personal information.</p></div>
      <div class="card" style="max-width:520px;">
        <div class="row mb-4" style="gap:16px;">
          <div class="avatar" style="width:64px;height:64px;font-size:22px;" id="avatar-big"></div>
          <div>
            <div style="font-weight:600;font-size:16px;" id="p-name"></div>
            <div class="text-muted text-sm" style="text-transform:capitalize;" id="p-role"></div>
          </div>
        </div>
        <form id="pf">
          <div class="field"><label>Full Name</label><input class="input" name="name" required /></div>
          <div class="field"><label>Roll Number</label><input class="input" name="roll" /></div>
          <div class="field">
            <label>Role</label>
            <select class="select" name="role">
              <option value="student">Student</option>
              <option value="captain">Captain</option>
            </select>
          </div>
          <button class="btn">Save Changes</button>
        </form>
      </div>
    </div>
  </div>
</div>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
function fill() {
  document.getElementById("avatar-big").textContent = initials(DB.user.name);
  document.getElementById("p-name").textContent = DB.user.name;
  document.getElementById("p-role").textContent = DB.user.role;
  const f = document.getElementById("pf");
  f.name.value = DB.user.name; f.roll.value = DB.user.roll; f.role.value = DB.user.role;
}
document.getElementById("pf").addEventListener("submit", e => {
  e.preventDefault();
  const fd = new FormData(e.target);
  DB.user.name = fd.get("name"); DB.user.roll = fd.get("roll"); DB.user.role = fd.get("role");
  saveData(DB); fill(); 
toast("Profile updated.");
});
fill();
</script>
</body>
</html>
